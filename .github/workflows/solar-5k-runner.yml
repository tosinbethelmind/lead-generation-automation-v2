name: ApexReach Nigeria 2.5K Real Solar Pipeline Runner

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution Mode (live-solar | synthetic | dry-run)'
        required: false
        default: 'live-solar'
      count:
        description: 'Target Lead Count'
        required: false
        default: '2500'
  repository_dispatch:
    types: [run-solar-5k]

jobs:
  run-solar-5k-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium & System Dependencies
        run: |
          npx playwright install chromium --with-deps

      - name: Execute Nigeria 2.5K Real Solar Pipeline Scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}
          ACTIVE_BROWSER_PROVIDER: browserless
        run: |
          echo "🚀 Executing Nigeria 2.5K Real Solar Pipeline Runner..."
          MODE="${{ github.event.inputs.mode || github.event.client_payload.mode || 'live-solar' }}"
          COUNT="${{ github.event.inputs.count || github.event.client_payload.count || '2500' }}"
          JOB_ID="${{ github.event.client_payload.job_id || '' }}"
          
          ARGS="--count $COUNT"
          if [ -n "$JOB_ID" ]; then
            ARGS="$ARGS --run-id $JOB_ID"
          fi
          
          if [ "$MODE" = "synthetic" ]; then
            node scripts/nigeria_solar_5k_scraper.js --synthetic $ARGS
          elif [ "$MODE" = "dry-run" ]; then
            node scripts/nigeria_solar_5k_scraper.js --dry-run $ARGS
          else
            node scripts/nigeria_solar_5k_scraper.js $ARGS
          fi
