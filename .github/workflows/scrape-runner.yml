name: ApexReach Scraper Queue Runner

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium & System Dependencies
        run: |
          npx playwright install chromium --with-deps

      - name: Build Next.js Application
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: Start Next.js Server
        env:
          PORT: 3006
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx next start -p 3006 &
          echo "Waiting for Next.js server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:3006/api/config > /dev/null; then
              echo "Next.js server is up and responding!"
              break
            fi
            sleep 2
          done

      - name: Execute Queue Poller (RUN_ONCE)
        env:
          RUN_ONCE: true
          PORT: 3006
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Set ACTIVE_BROWSER_PROVIDER to 'local' if you want to use the local Chromium installed above
          # Or set to 'browserless'/'browserbase' if you want to use rotating remote browsers
          ACTIVE_BROWSER_PROVIDER: local
        run: npx tsx scripts/local_job_runner.ts
