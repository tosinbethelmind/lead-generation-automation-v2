name: ApexReach Cloud Queue Runner

on:
  schedule:
    # Fallback cron check runs every 20 minutes
    - cron: '*/20 * * * *'
  repository_dispatch:
    types: [run-queue]
  workflow_dispatch:

jobs:
  run-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Cloud Runner Script
        run: node scripts/github_actions_runner.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_API_BASE_URL: ${{ secrets.SCRAPER_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
