# Fly.io deployment configuration for ApexReach Cloud Runner
# Deploy with: fly deploy --dockerfile Dockerfile.runner
#
# Set secrets before first deploy:
#   fly secrets set NEXT_PUBLIC_SUPABASE_URL="..." SUPABASE_SERVICE_ROLE_KEY="..." SCRAPER_API_BASE_URL="https://lead-generation-automation-e0oitxcsi.vercel.app"

app = "bethelmind-lead-engine"
primary_region = "lhr"  # London — closest to Lagos users
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile.runner"

[env]
  RUNNER_ENVIRONMENT = "huggingface"
  NODE_ENV = "production"
  PORT = "8080"

# Minimal machine size — runner is mostly idle (polling every 3s)
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# No inbound HTTP needed — runner only makes outbound calls
# But Fly.io requires at least a minimal port exposed for health checks
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false   # Keep running 24/7
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 10
    soft_limit = 5
